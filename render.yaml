services:
  - type: web
    name: koinonia
    env: php
    plan: free
    buildCommand: rm -f public/hot && composer install --no-interaction --prefer-dist --optimize-autoloader && @php -r "file_exists('.env') || copy('.env.example', '.env');" && @php artisan key:generate && npm install && npm run build && php artisan config:cache && php artisan route:cache
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production